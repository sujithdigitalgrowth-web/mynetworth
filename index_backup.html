<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Net Worth Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:#0a0b10;--bg2:#10121a;--card:#161922;--card-hover:#1c1f2e;
  --border:#232738;--border-light:#2e3348;--text:#e8e8ec;--text2:#c4c4cc;--muted:#6b6f80;
  --green:#22c55e;--green-bg:rgba(34,197,94,.08);
  --red:#ef4444;--red-bg:rgba(239,68,68,.08);
  --blue:#3b82f6;--blue-bg:rgba(59,130,246,.08);
  --purple:#a855f7;--purple-bg:rgba(168,85,247,.08);
  --orange:#f59e0b;--orange-bg:rgba(245,158,11,.08);
  --cyan:#06b6d4;--cyan-bg:rgba(6,182,212,.08);
  --pink:#ec4899;--pink-bg:rgba(236,72,153,.08);
  --sidebar-w:220px;--header-h:56px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}

/* Layout */
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50;transition:transform .2s}
.sidebar-brand{padding:16px 18px;font-size:1.1rem;font-weight:700;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;height:var(--header-h)}
.sidebar-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-section{font-size:.65rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);padding:14px 12px 6px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:8px;cursor:pointer;font-size:.84rem;color:var(--text2);transition:all .15s;margin-bottom:2px}
.nav-item:hover{background:var(--card);color:var(--text)}
.nav-item.active{background:var(--blue);color:#fff;font-weight:500}
.nav-item .ni{font-size:1rem;width:20px;text-align:center}
.nav-item.sp-only,.nav-section.sp-only{display:none}
.sp-on .nav-item.sp-only,.sp-on .nav-section.sp-only{display:flex}
.sidebar-footer{padding:12px;border-top:1px solid var(--border)}
.mode-toggle{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;user-select:none}
.mode-toggle:hover{background:var(--card)}
.mode-toggle span{font-size:.8rem;color:var(--muted)}
.sw{width:36px;height:20px;background:var(--border);border-radius:10px;position:relative;transition:background .2s;flex-shrink:0}
.sw::after{content:'';position:absolute;width:14px;height:14px;background:var(--text);border-radius:50%;top:3px;left:3px;transition:transform .2s}
.sw.on{background:var(--pink)}.sw.on::after{transform:translateX(16px)}

.content{margin-left:var(--sidebar-w);flex:1;min-height:100vh}
.content-header{height:var(--header-h);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:var(--bg2);position:sticky;top:0;z-index:40}
.content-header h2{font-size:1.05rem;font-weight:600}
.hdr-meta{display:flex;align-items:center;gap:14px}
.hdr-meta .date{color:var(--muted);font-size:.8rem}
.ni-wrap{display:flex;gap:8px;align-items:center}
.ni-wrap input{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--text);font-size:.8rem;width:110px;outline:none}
.ni-wrap input:focus{border-color:var(--blue)}
.ni-wrap label{font-size:.78rem;color:var(--muted)}
.content-body{padding:24px 28px}

/* Summary Cards */
.scards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.sc .sl{font-size:.65rem;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:6px}
.sc .sv{font-size:1.15rem;font-weight:700}
.sc.hero{background:linear-gradient(135deg,#161922,#1e2235);border-color:var(--blue);grid-column:span 2}
.sc.hero .sv{font-size:1.6rem}
.sc .ss{font-size:.7rem;color:var(--muted);margin-top:3px}
.pos{color:var(--green)}.neg{color:var(--red)}

/* Cards grid */
.cgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;margin-bottom:24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:18px;transition:border-color .15s}
.card:hover{border-color:var(--border-light)}
.card-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.card-hdr h4{font-size:.82rem;font-weight:600;display:flex;align-items:center;gap:8px}
.badge{font-size:.6rem;padding:2px 8px;border-radius:4px;font-weight:600;text-transform:uppercase}
.b-self{background:var(--blue-bg);color:var(--blue)}
.b-spouse{background:var(--pink-bg);color:var(--pink)}
.b-joint{background:var(--purple-bg);color:var(--purple)}
.card-rows{display:flex;flex-direction:column;gap:6px}
.cr{display:flex;justify-content:space-between;font-size:.8rem}
.cr .cl{color:var(--muted)}.cr .cv{font-weight:600}
.stitle{font-size:.95rem;font-weight:600;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.btn-add{background:var(--blue);color:#fff;border:none;padding:6px 14px;border-radius:7px;font-size:.78rem;cursor:pointer;font-weight:500}
.btn-add:hover{opacity:.9}

/* Items list */
.items{display:flex;flex-direction:column;gap:8px}
.it{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:rgba(255,255,255,.015);border-radius:8px;cursor:pointer;transition:background .1s}
.it:hover{background:rgba(255,255,255,.035)}
.it-l{display:flex;align-items:center;gap:9px}
.it-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.it-name{font-size:.84rem}.it-meta{font-size:.7rem;color:var(--muted)}
.it-r{text-align:right}
.it-val{font-size:.84rem;font-weight:600}
.it-sub{font-size:.68rem;color:var(--muted)}
.it-empty{color:var(--muted);font-size:.8rem;text-align:center;padding:20px}

/* Goals */
.gi{padding:12px 14px;background:rgba(255,255,255,.015);border-radius:8px;cursor:pointer;transition:background .1s}
.gi:hover{background:rgba(255,255,255,.035)}
.gt{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.gn{font-size:.84rem;font-weight:500}.gp{font-size:.78rem;font-weight:700}
.gd{display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted);margin-top:6px}
.pb{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:6px}
.pf{height:100%;border-radius:3px;transition:width .4s ease}

/* Charts */
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px;margin-bottom:24px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:18px}
.chart-card h4{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.chart-wrap{position:relative;max-height:280px}

/* Insights */
.ins-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;display:flex;align-items:flex-start;gap:12px}
.ins-icon{font-size:1.4rem;flex-shrink:0;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.ins-body h5{font-size:.85rem;font-weight:600;margin-bottom:3px}
.ins-body p{font-size:.78rem;color:var(--muted);line-height:1.4}

/* Cash flow */
.cf-hdr{font-size:.8rem;font-weight:600;padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:8px;display:flex;justify-content:space-between}
.cf-row{display:flex;justify-content:space-between;padding:7px 12px;font-size:.82rem;border-radius:6px}
.cf-row:nth-child(even){background:rgba(255,255,255,.01)}
.cf-total{font-weight:700;padding:10px 12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;margin-top:4px;font-size:.88rem}

/* Split view */
.split{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.split.tri{grid-template-columns:1fr 1fr 1fr}
.col-hdr{font-size:.8rem;font-weight:600;padding:10px 14px;border-radius:8px;text-align:center;margin-bottom:12px}
.col-hdr.h-self{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(59,130,246,.15)}
.col-hdr.h-spouse{background:var(--pink-bg);color:var(--pink);border:1px solid rgba(236,72,153,.15)}
.col-hdr.h-joint{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(168,85,247,.15)}

/* Tab pills */
.pills{display:flex;gap:4px;margin-bottom:18px;background:var(--card);border-radius:8px;padding:3px;border:1px solid var(--border);width:fit-content}
.pill{padding:7px 16px;border-radius:6px;font-size:.78rem;cursor:pointer;border:none;background:none;color:var(--muted);font-weight:500;transition:all .15s}
.pill.active{background:var(--blue);color:#fff}.pill:hover:not(.active){color:var(--text)}

/* Table */
.dtable{width:100%;border-collapse:collapse;font-size:.82rem;margin-bottom:20px}
.dtable th{text-align:left;padding:10px 12px;font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border);font-weight:600}
.dtable td{padding:10px 12px;border-bottom:1px solid var(--border)}
.dtable tr:hover td{background:var(--card-hover)}
.ob{font-size:.6rem;padding:2px 7px;border-radius:4px;font-weight:600}
.del-x{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.85rem}.del-x:hover{color:var(--red)}

/* Modal */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);z-index:200;justify-content:center;align-items:flex-start;padding-top:80px;overflow-y:auto}
.mo.active{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;width:92%;max-width:480px;margin-bottom:40px}
.modal h3{font-size:1rem;margin-bottom:18px}
.fg{margin-bottom:14px}
.modal label{display:block;color:var(--muted);font-size:.75rem;margin-bottom:4px;font-weight:500}
.modal input,.modal select{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.85rem;outline:none}
.modal input:focus,.modal select:focus{border-color:var(--blue)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.ma{display:flex;gap:10px;margin-top:20px}
.ma button{flex:1;padding:10px;border-radius:8px;border:none;font-size:.85rem;cursor:pointer;font-weight:500}
.btn-c{background:var(--border);color:var(--text)}
.btn-s{background:var(--blue);color:#fff}.btn-s:hover{opacity:.9}
.btn-d{background:var(--red);color:#fff;flex:.4}

/* Investment Planner Modal */
.ip-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);z-index:250;overflow-y:auto;padding:30px 16px}
.ip-overlay.active{display:flex;justify-content:center;align-items:flex-start}
.ip-modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:100%;max-width:960px;margin-bottom:40px}
.ip-hdr{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--border)}
.ip-hdr h3{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:10px}
.ip-close{background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer;padding:4px}.ip-close:hover{color:var(--text)}
.ip-body{padding:20px 24px}
.ip-sum{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.ip-sc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.ip-sc .sl{font-size:.6rem;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:4px}
.ip-sc .sv{font-size:1rem;font-weight:700}
.ip-controls{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:20px}
.ip-controls h4{font-size:.82rem;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.ip-slider-row{display:flex;align-items:center;gap:14px;margin-bottom:12px;flex-wrap:wrap}
.ip-slider-row label{font-size:.76rem;color:var(--muted);min-width:120px}
.ip-slider-row input[type=range]{flex:1;min-width:140px;accent-color:var(--blue);height:6px}
.ip-slider-row .ip-sv{font-size:.85rem;font-weight:700;color:var(--blue);min-width:60px;text-align:right}
.ip-manual{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.ip-manual .fg label{font-size:.7rem}
.ip-manual input{width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:.82rem;outline:none}
.ip-manual input:focus{border-color:var(--blue)}
.ip-invest-msg{font-size:.82rem;color:var(--text2);margin-top:10px;padding:10px 14px;background:var(--blue-bg);border-radius:8px;border:1px solid rgba(59,130,246,.12)}
.ip-invest-msg b{color:var(--blue)}
.ip-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:22px}
.ip-card{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:16px;position:relative;transition:border-color .2s}
.ip-card.fastest{border-color:var(--green)}
.ip-card.safest{border-color:var(--cyan)}
.ip-card.recommended{border-color:var(--blue);box-shadow:0 0 20px rgba(59,130,246,.08)}
.ip-tag{position:absolute;top:-8px;right:12px;font-size:.55rem;padding:2px 8px;border-radius:4px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.ip-tag.t-fast{background:var(--green);color:#000}
.ip-tag.t-safe{background:var(--cyan);color:#000}
.ip-tag.t-rec{background:var(--blue);color:#fff}
.ip-card-hdr{margin-bottom:12px}
.ip-card-hdr h5{font-size:.88rem;font-weight:600;margin-bottom:2px}
.ip-card-hdr .ip-risk{font-size:.65rem;padding:2px 7px;border-radius:4px;font-weight:600}
.r-low{background:var(--green-bg);color:var(--green)}
.r-mod{background:var(--orange-bg);color:var(--orange)}
.r-high{background:var(--blue-bg);color:var(--blue)}
.r-vhigh{background:var(--red-bg);color:var(--red)}
.ip-card-type{font-size:.7rem;color:var(--muted);margin-top:3px}
.ip-card-ret{font-size:.72rem;color:var(--cyan);font-weight:600;margin-top:2px}
.ip-card-rows{display:flex;flex-direction:column;gap:5px;margin-top:10px}
.ip-cr{display:flex;justify-content:space-between;font-size:.76rem}
.ip-cr .cl{color:var(--muted)}.ip-cr .cv{font-weight:600}
.ip-time{font-size:1.15rem;font-weight:800;margin:8px 0 2px}
.ip-tbar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:8px}
.ip-tf{height:100%;border-radius:3px;transition:width .5s ease}
.ip-insights{display:flex;flex-direction:column;gap:8px;margin-top:20px}
.ip-ins{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:9px}
.ip-ins .ii{font-size:1.1rem;flex-shrink:0}
.ip-ins p{font-size:.78rem;color:var(--text2);line-height:1.45}
.ip-actions{display:flex;gap:10px;margin-top:18px;padding-top:16px;border-top:1px solid var(--border)}
.ip-actions button{padding:9px 18px;border-radius:8px;border:none;font-size:.82rem;cursor:pointer;font-weight:500}

/* Step 1: Investment Options Grid */
.goal-block{margin-bottom:28px}
.goal-card{margin-bottom:0!important}
.strat-banner{margin-top:14px;padding:10px 14px;background:linear-gradient(135deg,rgba(59,130,246,.08),rgba(34,197,94,.06));border:1px solid rgba(59,130,246,.15);border-radius:8px;font-size:.76rem;color:var(--text2);font-weight:500;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.strat-banner b{color:var(--blue)}
.strat-banner .strat-clear{margin-left:auto;font-size:.65rem;color:var(--muted);cursor:pointer;text-decoration:underline}
.strat-banner .strat-clear:hover{color:var(--red)}
.inv-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-top:14px}
.inv-opt{background:var(--card);border:2px solid var(--border);border-radius:11px;padding:14px 12px;cursor:pointer;text-align:center;transition:all .2s;position:relative}
.inv-opt:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.18)}
.inv-opt.active{border-color:var(--green);background:rgba(34,197,94,.04)}
.inv-opt.active::after{content:'✓ Active';position:absolute;top:-7px;right:8px;font-size:.5rem;padding:1px 6px;border-radius:3px;background:var(--green);color:#000;font-weight:700}
.inv-icon{font-size:1.6rem;margin-bottom:6px}
.inv-opt h5{font-size:.8rem;font-weight:600;margin-bottom:4px}
.inv-label{font-size:.55rem;padding:2px 7px;border-radius:4px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;display:inline-block;margin-bottom:5px}
.il-growth{background:var(--green-bg);color:var(--green)}.il-mod{background:var(--orange-bg);color:var(--orange)}
.il-safe{background:var(--cyan-bg);color:var(--cyan)}.il-hedge{background:var(--purple-bg);color:var(--purple)}
.il-vsafe{background:var(--blue-bg);color:var(--blue)}.il-long{background:var(--pink-bg);color:var(--pink)}
.inv-rate{font-size:.88rem;font-weight:700;color:var(--text);margin-bottom:3px}
.inv-tag{font-size:.6rem;color:var(--muted);font-weight:500;margin-bottom:2px}
.inv-desc{font-size:.62rem;color:var(--muted)}
.inv-opt .inv-risk{font-size:.58rem;color:var(--muted);margin-top:2px}

/* Step 2: Planner Modal extras */
.ip-qb{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.ip-qb button{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:.76rem;cursor:pointer;font-weight:500;transition:all .15s}
.ip-qb button.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.ip-qb button:hover:not(.active){border-color:var(--blue);color:var(--blue)}
.ip-type-hdr{display:flex;align-items:center;gap:14px;padding:16px 18px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:20px}
.ip-type-icon{font-size:2rem}
.ip-type-info h4{font-size:1rem;font-weight:700;margin-bottom:3px}
.ip-type-meta{font-size:.72rem;color:var(--muted)}
.ip-calc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:20px}
.ip-calc-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;text-align:center}
.ip-calc-card .ip-cl{font-size:.58rem;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:6px}
.ip-calc-card .ip-cv{font-size:1.1rem;font-weight:700}
.ip-feedback{background:linear-gradient(135deg,rgba(59,130,246,.06),rgba(34,197,94,.04));border:1px solid rgba(59,130,246,.1);border-radius:10px;padding:14px 18px;margin-bottom:18px}
.ip-feedback p{font-size:.8rem;color:var(--text2);line-height:1.6;margin-bottom:6px}
.ip-feedback p:last-child{margin-bottom:0}
.ip-feedback b{color:var(--blue)}
.ip-compare{margin-bottom:18px}
.ip-compare h5{font-size:.8rem;font-weight:600;margin-bottom:10px;color:var(--muted);display:flex;align-items:center;gap:6px}
.ip-cmp-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;font-size:.76rem;color:var(--text2)}
.ip-cmp-row .cmp-i{font-size:1rem;flex-shrink:0}
.ip-cmp-row b{color:var(--text)}

/* Mobile */
.mob-hdr{display:none}
@media(max-width:860px){
  .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}
  .content{margin-left:0}
  .mob-hdr{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:45}
  .mob-hdr .ham{background:none;border:none;color:var(--text);font-size:1.3rem;cursor:pointer}
  .mob-hdr h2{font-size:1rem;font-weight:600}
  .content-header{display:none}
  .content-body{padding:16px}

<script>
// ── Constants ──
const ACAT=['Cash & Bank','Fixed Deposits','Stocks','Mutual Funds','Real Estate','Gold','PPF/EPF','NPS','Crypto','Vehicles','Electronics','Other'];
const LTYP=['Home Loan','Car Loan','Personal Loan','Education Loan','Credit Card','Gold Loan','Other'];
const ECAT=['Housing','Food','Transport','Utilities','Insurance','Shopping','Health','Education','Entertainment','Other'];
const ITYP=['Salary','Freelance','Rental','Dividend','Interest','Business','Other'];
const ITYPS=['Term Life','Health','Vehicle','Home','Travel','Critical Illness','Personal Accident','Other'];

// ── State ──
let S=loadS();
let page='overview';
let mCtx=null;
let charts={};

function defS(){return{meta:{name1:'',name2:'',sp:false},assets:[],liabilities:[],income:[],expenses:[],goals:[],insurance:[],snaps:[]}}
function loadS(){
  try{const s=JSON.parse(localStorage.getItem('nw_s'));if(s){const d=defS();for(const k of Object.keys(d))if(!(k in s))s[k]=d[k];return s;}}catch(e){}
  // migrate old
  try{
    const old=localStorage.getItem('nw_person1')||localStorage.getItem('networthData');
    if(old){const s=defS();const d=JSON.parse(old);const m=JSON.parse(localStorage.getItem('nw_meta')||'{}');
    s.meta.name1=m.name1||'';s.meta.name2=m.name2||'';s.meta.sp=m.hasPartner||false;
    if(d.income)d.income.forEach(i=>s.income.push({id:gid(),name:i.name,type:'Salary',owner:'self',amount:i.amount}));
    if(d.savings)d.savings.forEach(i=>s.assets.push({id:gid(),name:i.name,category:'Cash & Bank',owner:'self',currentValue:i.amount,invested:i.amount,updated:td()}));
    if(d.investments)d.investments.forEach(i=>s.assets.push({id:gid(),name:i.name,category:'Mutual Funds',owner:'self',currentValue:i.amount,invested:i.amount,updated:td()}));
    if(d.assets)d.assets.forEach(i=>s.assets.push({id:gid(),name:i.name,category:'Other',owner:'self',currentValue:i.amount,invested:i.amount,updated:td()}));
    if(d.debts)d.debts.forEach(i=>s.liabilities.push({id:gid(),name:i.name,type:'Other',owner:'self',total:i.amount,outstanding:i.amount,emi:0,rate:0,tenure:0}));
    if(d.emis)d.emis.forEach(i=>s.expenses.push({id:gid(),name:i.name,category:'EMI',owner:'self',amount:i.amount,isEMI:true}));
    if(d.goals)d.goals.forEach(i=>s.goals.push({id:gid(),name:i.name,owner:'self',target:i.target,current:i.current}));
    try{const d2=JSON.parse(localStorage.getItem('nw_person2')||'{}');
    if(d2.income)d2.income.forEach(i=>s.income.push({id:gid(),name:i.name,type:'Salary',owner:'spouse',amount:i.amount}));
    if(d2.savings)d2.savings.forEach(i=>s.assets.push({id:gid(),name:i.name,category:'Cash & Bank',owner:'spouse',currentValue:i.amount,invested:i.amount,updated:td()}));
    if(d2.investments)d2.investments.forEach(i=>s.assets.push({id:gid(),name:i.name,category:'Mutual Funds',owner:'spouse',currentValue:i.amount,invested:i.amount,updated:td()}));
    if(d2.assets)d2.assets.forEach(i=>s.assets.push({id:gid(),name:i.name,category:'Other',owner:'spouse',currentValue:i.amount,invested:i.amount,updated:td()}));
    if(d2.debts)d2.debts.forEach(i=>s.liabilities.push({id:gid(),name:i.name,type:'Other',owner:'spouse',total:i.amount,outstanding:i.amount,emi:0,rate:0,tenure:0}));
    if(d2.emis)d2.emis.forEach(i=>s.expenses.push({id:gid(),name:i.name,category:'EMI',owner:'spouse',amount:i.amount,isEMI:true}));
    if(d2.goals)d2.goals.forEach(i=>s.goals.push({id:gid(),name:i.name,owner:'spouse',target:i.target,current:i.current}));
    }catch(e){}
    localStorage.removeItem('nw_person1');localStorage.removeItem('nw_person2');localStorage.removeItem('nw_meta');localStorage.removeItem('networthData');
    return s;}
  }catch(e){}
  // migrate nw_state
  try{const old2=JSON.parse(localStorage.getItem('nw_state'));if(old2){
    const s=defS();s.meta={name1:old2.meta?.name1||'',name2:old2.meta?.name2||'',sp:old2.meta?.spouseMode||false};
    s.assets=(old2.assets||[]).map(a=>({id:a.id||gid(),name:a.name,category:a.category||'Other',owner:a.owner||'self',currentValue:a.currentValue||0,invested:a.investedAmount||0,updated:a.lastUpdated||td(),selfC:a.selfContrib||50,spouseC:a.spouseContrib||50}));
    s.liabilities=(old2.liabilities||[]).map(l=>({id:l.id||gid(),name:l.name,type:l.type||'Other',owner:l.owner||'self',total:l.totalAmount||0,outstanding:l.outstanding||0,emi:l.emi||0,rate:l.interestRate||0,tenure:l.tenureLeft||0}));
    s.income=(old2.income||[]).map(i=>({id:i.id||gid(),name:i.name,type:i.type||'Salary',owner:i.owner||'self',amount:i.amount||0}));
    s.expenses=(old2.expenses||[]).map(e=>({id:e.id||gid(),name:e.name,category:e.category||'Other',owner:e.owner||'self',amount:e.amount||0,isEMI:e.isEMI||false}));
    s.goals=(old2.goals||[]).map(g=>({id:g.id||gid(),name:g.name,owner:g.owner||'self',target:g.targetAmount||0,current:g.currentAmount||0}));
    s.snaps=old2.snapshots||[];
    localStorage.removeItem('nw_state');return s;
  }}catch(e){}
  return defS();
}
function saveS(){localStorage.setItem('nw_s',JSON.stringify(S))}
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function td(){return new Date().toISOString().split('T')[0]}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function gn(o){return o==='self'?(S.meta.name1||'You'):o==='spouse'?(S.meta.name2||'Spouse'):'Joint'}

// ── Calculations ──
function aOf(o){return S.assets.filter(a=>a.owner===o).reduce((s,a)=>s+(+a.currentValue||0),0)}
function lOf(o){return S.liabilities.filter(l=>l.owner===o).reduce((s,l)=>s+(+l.outstanding||0),0)}
function nwOf(o){return aOf(o)-lOf(o)}
function iOf(o){return S.income.filter(i=>i.owner===o).reduce((s,i)=>s+(+i.amount||0),0)}
function eOf(o){return S.expenses.filter(e=>e.owner===o&&!e.isEMI).reduce((s,e)=>s+(+e.amount||0),0)}
function emiOf(o){return S.liabilities.filter(l=>l.owner===o).reduce((s,l)=>s+(+l.emi||0),0)+S.expenses.filter(e=>e.owner===o&&e.isEMI).reduce((s,e)=>s+(+e.amount||0),0)}
function tA(){return S.assets.reduce((s,a)=>s+(+a.currentValue||0),0)}
function tL(){return S.liabilities.reduce((s,l)=>s+(+l.outstanding||0),0)}
function tNW(){return tA()-tL()}
function tI(){return S.income.reduce((s,i)=>s+(+i.amount||0),0)}
function tE(){return S.expenses.reduce((s,e)=>s+(+e.amount||0),0)}
function tEMI(){return S.liabilities.reduce((s,l)=>s+(+l.emi||0),0)+S.expenses.filter(e=>e.isEMI).reduce((s,e)=>s+(+e.amount||0),0)}
function fmt(n){if(n==null||isNaN(n))return'₹0';const a=Math.abs(n);let s;if(a>=1e7)s='₹'+(a/1e7).toFixed(2)+' Cr';else if(a>=1e5)s='₹'+(a/1e5).toFixed(2)+' L';else s='₹'+a.toLocaleString('en-IN');return n<0?'−'+s:s}
function fP(n){return(n>=0?'+':'')+n.toFixed(1)+'%'}
function retP(c,i){return i>0?((c-i)/i*100):0}

// ── Navigation ──
function nav(p){
  page=p;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.p===p));
  const t={overview:'Overview',my:'My Dashboard',spouse:'Spouse Dashboard',joint:'Joint / Family',assets:'Assets',liabilities:'Liabilities',cashflow:'Cash Flow',goals:'Goals',insurance:'Insurance',charts:'Charts & Visuals',insights:'Insights'};
  document.getElementById('pgTitle').textContent=t[p]||'Dashboard';
  document.getElementById('mobTitle').textContent=t[p]||'Dashboard';
  renderPage();
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sbOverlay').classList.remove('active');
}
document.querySelectorAll('.nav-item[data-p]').forEach(el=>{el.addEventListener('click',()=>nav(el.dataset.p))});

function renderPage(){
  const b=document.getElementById('cBody');
  dCharts();
  switch(page){
    case'overview':b.innerHTML=pgOverview();break;
    case'my':b.innerHTML=pgDash('self');break;
    case'spouse':b.innerHTML=pgDash('spouse');break;
    case'joint':b.innerHTML=pgDash('joint');break;
    case'assets':b.innerHTML=pgAssets();break;
    case'liabilities':b.innerHTML=pgLiab();break;
    case'cashflow':b.innerHTML=pgCF();break;
    case'goals':b.innerHTML=pgGoals();break;
    case'insurance':b.innerHTML=pgInsurance();break;
    case'charts':b.innerHTML=pgCharts();break;
    case'insights':b.innerHTML=pgInsights();break;
  }
  if(page==='charts')initCharts();
}

function render(){
  document.getElementById('dateDisp').textContent=new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('n1').value=S.meta.name1;
  document.getElementById('n2').value=S.meta.name2;
  applySP();renderPage();snap();
}
function saveMeta(){S.meta.name1=document.getElementById('n1').value.trim();S.meta.name2=document.getElementById('n2').value.trim();saveS();render()}
function togSP(){S.meta.sp=!S.meta.sp;saveS();render()}
function applySP(){
  const on=S.meta.sp;
  document.getElementById('app').classList.toggle('sp-on',on);
  document.getElementById('spSw').className='sw'+(on?' on':'');
  document.getElementById('modeLbl').textContent=on?'Family Mode ON':'Family Mode';
  document.getElementById('n2').style.display=on?'':'none';
  document.getElementById('n2l').style.display=on?'':'none';
  if(!on&&(page==='spouse'||page==='joint'))nav('overview');
}
function togSB(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sbOverlay').classList.toggle('active')}

// ── Summary Cards ──
function sumCards(){
  const sp=S.meta.sp;
  if(!sp){
    const nw=nwOf('self'),a=aOf('self'),l=lOf('self'),inc=iOf('self'),exp=eOf('self'),emi=emiOf('self'),sur=inc-exp-emi;
    return`<div class="scards">
      <div class="sc hero"><div class="sl">My Net Worth</div><div class="sv ${nw>=0?'pos':'neg'}">${fmt(nw)}</div><div class="ss">Assets ${fmt(a)} − Liabilities ${fmt(l)}</div></div>
      <div class="sc"><div class="sl">Total Assets</div><div class="sv pos">${fmt(a)}</div></div>
      <div class="sc"><div class="sl">Total Liabilities</div><div class="sv neg">${fmt(l)}</div></div>
      <div class="sc"><div class="sl">Monthly Income</div><div class="sv">${fmt(inc)}</div></div>
      <div class="sc"><div class="sl">Monthly Expenses</div><div class="sv">${fmt(exp)}</div></div>
      <div class="sc"><div class="sl">Monthly EMI</div><div class="sv neg">${fmt(emi)}</div></div>
      <div class="sc"><div class="sl">Monthly Surplus</div><div class="sv ${sur>=0?'pos':'neg'}">${fmt(sur)}</div></div>
    </div>`;
  }else{
    const snw=nwOf('self'),spnw=nwOf('spouse'),jnw=nwOf('joint'),tnw=tNW(),ta2=tA(),tl2=tL(),ti2=tI(),te2=tEMI(),texp=tE(),sur=ti2-texp-te2;
    return`<div class="scards">
      <div class="sc"><div class="sl">${esc(gn('self'))}'s NW</div><div class="sv ${snw>=0?'pos':'neg'}">${fmt(snw)}</div></div>
      <div class="sc"><div class="sl">${esc(gn('spouse'))}'s NW</div><div class="sv ${spnw>=0?'pos':'neg'}">${fmt(spnw)}</div></div>
      <div class="sc"><div class="sl">Joint NW</div><div class="sv ${jnw>=0?'pos':'neg'}">${fmt(jnw)}</div></div>
      <div class="sc hero"><div class="sl">Total Family Net Worth</div><div class="sv ${tnw>=0?'pos':'neg'}">${fmt(tnw)}</div><div class="ss">Assets ${fmt(ta2)} − Liabilities ${fmt(tl2)}</div></div>
      <div class="sc"><div class="sl">Family Assets</div><div class="sv pos">${fmt(ta2)}</div></div>
      <div class="sc"><div class="sl">Family Liabilities</div><div class="sv neg">${fmt(tl2)}</div></div>
      <div class="sc"><div class="sl">Combined Income</div><div class="sv">${fmt(ti2)}</div></div>
      <div class="sc"><div class="sl">Combined EMI</div><div class="sv neg">${fmt(te2)}</div></div>
      <div class="sc"><div class="sl">Family Surplus</div><div class="sv ${sur>=0?'pos':'neg'}">${fmt(sur)}</div></div>
    </div>`;
  }
}

// ── Page: Overview ──
function pgOverview(){
  let h=sumCards();
  if(S.meta.sp){
    h+=`<div class="split tri">`;
    ['self','spouse','joint'].forEach(o=>{
      const cls=o==='self'?'h-self':o==='spouse'?'h-spouse':'h-joint';
      const a=aOf(o),l=lOf(o),nw=nwOf(o),inc=iOf(o),exp=eOf(o),emi=emiOf(o),sur=inc-exp-emi;
      const topA=S.assets.filter(x=>x.owner===o).sort((a,b)=>(b.currentValue||0)-(a.currentValue||0)).slice(0,3);
      const topL=S.liabilities.filter(x=>x.owner===o).sort((a,b)=>(b.outstanding||0)-(a.outstanding||0)).slice(0,3);
      const incSrc=S.income.filter(x=>x.owner===o);
      h+=`<div><div class="col-hdr ${cls}">${o==='joint'?'🏠':'👤'} ${esc(gn(o))}</div>
        <div class="card"><div class="card-hdr"><h4>Net Worth</h4></div><div class="card-rows">
          <div class="cr"><span class="cl">Assets</span><span class="cv pos">${fmt(a)}</span></div>
          <div class="cr"><span class="cl">Liabilities</span><span class="cv neg">${fmt(l)}</span></div>
          <div class="cr"><span class="cl">Net Worth</span><span class="cv ${nw>=0?'pos':'neg'}">${fmt(nw)}</span></div>
        </div></div>
        <div class="card" style="margin-top:12px"><div class="card-hdr"><h4>💸 Cash Flow</h4></div><div class="card-rows">
          <div class="cr"><span class="cl">Income</span><span class="cv pos">${fmt(inc)}</span></div>
          <div class="cr"><span class="cl">Expenses</span><span class="cv">${fmt(exp)}</span></div>
          <div class="cr"><span class="cl">EMIs</span><span class="cv neg">${fmt(emi)}</span></div>
          <div class="cr" style="border-top:1px solid var(--border);padding-top:6px;margin-top:4px"><span class="cl" style="font-weight:600">Surplus</span><span class="cv ${sur>=0?'pos':'neg'}">${fmt(sur)}</span></div>
        </div></div>
        <div class="card" style="margin-top:12px"><div class="card-hdr"><h4>💰 Earnings</h4></div>
          <div class="items">${incSrc.length?incSrc.map(i=>`<div class="it"><div class="it-l"><div class="it-dot" style="background:var(--green)"></div><span class="it-name">${esc(i.name)}</span><span class="it-meta">${esc(i.type)}</span></div><div class="it-r"><span class="it-val">${fmt(i.amount)}/mo</span></div></div>`).join(''):'<div class="it-empty">No income</div>'}</div>
        </div>
        <div class="card" style="margin-top:12px"><div class="card-hdr"><h4>Top Assets</h4></div>
          <div class="items">${topA.length?topA.map(a=>`<div class="it"><div class="it-l"><div class="it-dot" style="background:var(--green)"></div><span class="it-name">${esc(a.name)}</span></div><div class="it-r"><span class="it-val">${fmt(a.currentValue)}</span></div></div>`).join(''):'<div class="it-empty">No assets</div>'}</div>
        </div>
        <div class="card" style="margin-top:12px"><div class="card-hdr"><h4>Top Liabilities</h4></div>
          <div class="items">${topL.length?topL.map(l=>`<div class="it"><div class="it-l"><div class="it-dot" style="background:var(--red)"></div><span class="it-name">${esc(l.name)}</span></div><div class="it-r"><span class="it-val neg">${fmt(l.outstanding)}</span></div></div>`).join(''):'<div class="it-empty">No liabilities</div>'}</div>
        </div>
      </div>`;
    });
    h+=`</div>`;
  }else{
    const topA=S.assets.filter(a=>a.owner==='self').sort((a,b)=>(b.currentValue||0)-(a.currentValue||0)).slice(0,5);
    const topL=S.liabilities.filter(l=>l.owner==='self').sort((a,b)=>(b.outstanding||0)-(a.outstanding||0)).slice(0,5);
    const goals=S.goals.filter(g=>g.owner==='self').slice(0,4);
    const incSrc=S.income.filter(i=>i.owner==='self');
    const inc=iOf('self'),exp=eOf('self'),emi=emiOf('self'),sur=inc-exp-emi;
    h+=`<div class="cgrid">
      <div class="card"><div class="card-hdr"><h4>💰 Monthly Earnings</h4><button class="btn-add" onclick="openMo('income','self')" style="font-size:.72rem;padding:4px 10px">+ Add</button></div><div class="items">${incSrc.length?incSrc.map(i=>`<div class="it" onclick="openMo('income','self','${i.id}')"><div class="it-l"><div class="it-dot" style="background:var(--green)"></div><span class="it-name">${esc(i.name)}</span><span class="it-meta">${esc(i.type)}</span></div><div class="it-r"><span class="it-val pos">${fmt(i.amount)}/mo</span></div></div>`).join(''):'<div class="it-empty">No income yet. <b style="cursor:pointer;color:var(--blue)" onclick="openMo(\'income\',\'self\')">Add one →</b></div>'}</div>${incSrc.length?`<div style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px;display:flex;justify-content:space-between;font-size:.82rem"><span class="cl" style="font-weight:600">Total Earnings</span><span class="cv pos" style="font-weight:700">${fmt(inc)}/mo</span></div>`:''}</div>
      <div class="card"><div class="card-hdr"><h4>💸 Cash Flow</h4></div><div class="card-rows">
        <div class="cr"><span class="cl">Income</span><span class="cv pos">${fmt(inc)}</span></div>
        <div class="cr"><span class="cl">Expenses</span><span class="cv">${fmt(exp)}</span></div>
        <div class="cr"><span class="cl">EMIs</span><span class="cv neg">${fmt(emi)}</span></div>
        <div class="cr" style="border-top:1px solid var(--border);padding-top:8px;margin-top:4px"><span class="cl" style="font-weight:600">Surplus</span><span class="cv ${sur>=0?'pos':'neg'}">${fmt(sur)}</span></div>

function genIns(){
  const ins=[];const ti2=tI(),te2=tE(),temi2=tEMI(),ta2=tA(),tl2=tL(),nw=tNW();
  if(ti2>0){const sr=((ti2-te2-temi2)/ti2*100);
    if(sr>=30)ins.push({ic:'🌟',bg:'var(--green-bg)',t:'Great Savings Rate',d:`Saving ${sr.toFixed(0)}% of income. Above the recommended 20%.`});
    else if(sr>=15)ins.push({ic:'👍',bg:'var(--blue-bg)',t:'Decent Savings Rate',d:`Saving ${sr.toFixed(0)}%. Try pushing toward 30%.`});
    else if(sr>=0)ins.push({ic:'⚠️',bg:'var(--orange-bg)',t:'Low Savings Rate',d:`Only saving ${sr.toFixed(0)}%. Consider cutting expenses.`});
    else ins.push({ic:'🚨',bg:'var(--red-bg)',t:'Negative Cash Flow',d:`Spending more than earning. Deficit: ${fmt(Math.abs(ti2-te2-temi2))}/month.`});}
  if(ti2>0&&temi2>0){const eb=temi2/ti2*100;
    if(eb>50)ins.push({ic:'🔴',bg:'var(--red-bg)',t:'High EMI Burden',d:`EMIs take ${eb.toFixed(0)}% of income. Risky — keep below 40%.`});
    else if(eb>35)ins.push({ic:'🟡',bg:'var(--orange-bg)',t:'Moderate EMI Burden',d:`EMIs are ${eb.toFixed(0)}% of income. Safe limit is ~40%.`});
    else ins.push({ic:'🟢',bg:'var(--green-bg)',t:'Healthy EMI Level',d:`EMIs are ${eb.toFixed(0)}% of income. Well within safe limits.`});}
  if(S.liabilities.length){const top=[...S.liabilities].sort((a,b)=>(b.outstanding||0)-(a.outstanding||0))[0];ins.push({ic:'📉',bg:'var(--red-bg)',t:'Biggest Liability',d:`"${top.name}" at ${fmt(top.outstanding)} outstanding (${top.rate}% interest).`})}
  if(nw>0)ins.push({ic:'💪',bg:'var(--green-bg)',t:'Positive Net Worth',d:`Net worth is ${fmt(nw)}. Keep building!`});
  else if(nw<0)ins.push({ic:'📊',bg:'var(--red-bg)',t:'Negative Net Worth',d:`You owe ${fmt(Math.abs(nw))} more than you own. Focus on debt reduction.`});
  if(S.assets.length>1){const bc={};S.assets.forEach(a=>{bc[a.category]=(bc[a.category]||0)+(a.currentValue||0)});const tc=Object.entries(bc).sort((a,b)=>b[1]-a[1])[0];
    if(tc&&ta2>0&&tc[1]/ta2>.6)ins.push({ic:'⚖️',bg:'var(--purple-bg)',t:'Concentrated Portfolio',d:`${Math.round(tc[1]/ta2*100)}% of assets in "${tc[0]}". Consider diversifying.`})}
  S.goals.forEach(g=>{const p=g.target>0?Math.round(g.current/g.target*100):0;
    if(p>=100)ins.push({ic:'🎉',bg:'var(--green-bg)',t:'Goal Reached!',d:`"${g.name}" complete at ${p}%!`});
    else if(p<25)ins.push({ic:'🎯',bg:'var(--orange-bg)',t:'Goal Needs Attention',d:`"${g.name}" at ${p}%. ${fmt(g.target-g.current)} more to go.`})});
  if(S.meta.sp){const s1=iOf('self'),s2=iOf('spouse');if(s1>0&&s2>0){const r=Math.round(s1/(s1+s2)*100);ins.push({ic:'👥',bg:'var(--blue-bg)',t:'Income Split',d:`${gn('self')} contributes ${r}% and ${gn('spouse')} ${100-r}% of family income.`})}}

}

let ipGoalId=null,ipTypeKey=null,ipPct=60,ipLump=0,ipManualSIP=0,ipManualMode=false,ipCustomRate=0;

function openIP(gid2,typeKey){
  const g=S.goals.find(x=>x.id===gid2);if(!g)return;
  const opt=INV_TYPES.find(t=>t.key===typeKey);if(!opt)return;
  ipGoalId=gid2;ipTypeKey=typeKey;ipPct=60;ipLump=0;ipManualSIP=0;ipManualMode=false;
  ipCustomRate=opt.rate;
  // Load existing strategy if same type
  if(g.strategy&&g.strategy.key===typeKey){
    ipPct=g.strategy.allocPct||60;ipCustomRate=g.strategy.customRate||opt.rate;
    ipLump=g.strategy.lumpSum||0;
    if(g.strategy.manualSIP){ipManualSIP=g.strategy.manualSIP;ipManualMode=true}
  }
  renderIP();
  document.getElementById('ipOverlay').classList.add('active');
}
function closeIP(){document.getElementById('ipOverlay').classList.remove('active');ipGoalId=null;ipTypeKey=null}

function getSurplusForGoal(g){
  const o=g.owner;
  if(o==='joint'){return Math.max(0,tI()-tE()-tEMI())}
  return Math.max(0,iOf(o)-eOf(o)-emiOf(o));
}

function sipMonths(monthly,rate,target,lump){
  if(monthly<=0)return{months:Infinity,totalInv:0,totalRet:0};
  const r=rate/100/12;let bal=lump||0;let m=0;const maxM=600;
  while(bal<target&&m<maxM){bal=bal*(1+r)+monthly;m++}
  const totalInv=monthly*m+(lump||0);
  return{months:Math.min(m,maxM),totalInv,totalRet:Math.max(0,target-totalInv)}
}

function fmtTime(m){
  if(m>=600)return'50+ years';
  const y=Math.floor(m/12),mo=m%12;
  if(y===0)return mo+' mo';
  return mo>0?y+'y '+mo+'mo':y+' years';
}

function renderIP(){
  const g=S.goals.find(x=>x.id===ipGoalId);if(!g)return;
  const opt=INV_TYPES.find(t=>t.key===ipTypeKey);if(!opt)return;
  const surplus=getSurplusForGoal(g);
  const gap=Math.max(0,(g.target||0)-(g.current||0));
  const pct=g.target>0?Math.min(100,Math.round(g.current/g.target*100)):0;
  const monthly=ipManualMode?ipManualSIP:Math.round(surplus*ipPct/100);
  const rate=ipCustomRate;
  const lump=ipLump||0;
  const effectiveGap=Math.max(0,gap-lump);
  const calc=sipMonths(monthly,rate,effectiveGap>0?effectiveGap:1,0);

  let h='';
  // Goal summary
  h+=`<div class="ip-sum">
    <div class="ip-sc"><div class="sl">Target</div><div class="sv">${fmt(g.target)}</div></div>
    <div class="ip-sc"><div class="sl">Saved</div><div class="sv pos">${fmt(g.current)}</div></div>
    <div class="ip-sc"><div class="sl">Gap</div><div class="sv neg">${fmt(gap)}</div></div>
    <div class="ip-sc"><div class="sl">Progress</div><div class="sv" style="color:${pct>=100?'var(--green)':pct>50?'var(--blue)':'var(--orange)'}">${pct}%</div></div>
    <div class="ip-sc"><div class="sl">Surplus</div><div class="sv">${fmt(surplus)}/mo</div></div>
  </div>`;

  // Selected investment type header
  h+=`<div class="ip-type-hdr">
    <span class="ip-type-icon">${opt.icon}</span>
    <div class="ip-type-info">
      <h4>${esc(opt.name)}</h4>
      <span class="inv-label ${opt.labelCls}" style="margin-right:8px">${opt.label}</span>
      <span class="ip-type-meta">${esc(opt.desc)} · ${opt.risk} · ${opt.tag}</span>
    </div>
  </div>`;

  // Allocation controls
  h+=`<div class="ip-controls"><h4>⚙️ Allocation Controls</h4>`;
  // Quick buttons
  h+=`<div class="ip-qb">`;
  [50,60,70,80,100].forEach(p=>{
    h+=`<button class="${ipPct===p&&!ipManualMode?'active':''}" onclick="ipPct=${p};ipManualMode=false;renderIP()">${p}%</button>`;
  });
  h+=`</div>`;
  // Slider
  h+=`<div class="ip-slider-row"><label>Fine-tune allocation</label><input type="range" min="10" max="100" step="5" value="${ipPct}" oninput="ipPct=+this.value;ipManualMode=false;renderIP()"><span class="ip-sv">${ipPct}%</span></div>`;
  // Message
  h+=`<div class="ip-invest-msg">You are currently allocating <b>${ipPct}%</b> of your surplus · Monthly investment = <b>${fmt(monthly)}</b>${lump>0?' + <b>'+fmt(lump)+'</b> lump sum':''}</div>`;
  // Manual overrides
  h+=`<div class="ip-manual">
    <div class="fg"><label>Override Monthly SIP (₹)</label><input type="number" value="${ipManualSIP||''}" placeholder="Auto: ${fmt(Math.round(surplus*ipPct/100))}" oninput="ipManualSIP=+this.value||0;ipManualMode=!!this.value;renderIP()"></div>
    <div class="fg"><label>Lump Sum Investment (₹)</label><input type="number" value="${ipLump||''}" placeholder="One-time amount" oninput="ipLump=+this.value||0;renderIP()"></div>
  </div>`;
  // Editable return
  h+=`<div style="margin-top:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap"><label style="font-size:.76rem;color:var(--muted)">Expected Return</label><input type="number" step="0.5" value="${rate}" style="width:64px;padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--cyan);font-size:.85rem;font-weight:700;text-align:center;outline:none" oninput="ipCustomRate=+this.value||${opt.rate};renderIP()"><span style="font-size:.72rem;color:var(--muted)">% p.a. (default: ${opt.rate}%)</span></div>`;
  h+=`</div>`; // close controls

  // Calculation results
  h+=`<h4 style="font-size:.88rem;font-weight:600;margin:18px 0 12px;display:flex;align-items:center;gap:6px">📊 Projection</h4>`;
  h+=`<div class="ip-calc-grid">
    <div class="ip-calc-card"><div class="ip-cl">Monthly Investment</div><div class="ip-cv">${fmt(monthly)}</div></div>
    <div class="ip-calc-card"><div class="ip-cl">Expected Return</div><div class="ip-cv" style="color:var(--cyan)">${rate}% p.a.</div></div>
    <div class="ip-calc-card"><div class="ip-cl">Time to Goal</div><div class="ip-cv" style="color:${calc.months<600?'var(--green)':'var(--red)'};font-size:1.25rem">${calc.months<600?fmtTime(calc.months):'∞'}</div></div>
    <div class="ip-calc-card"><div class="ip-cl">Total Invested</div><div class="ip-cv">${fmt(calc.totalInv+(lump||0))}</div></div>
    <div class="ip-calc-card"><div class="ip-cl">Total Returns</div><div class="ip-cv pos">${fmt(calc.totalRet)}</div></div>
  </div>`;

  // Smart Feedback
  h+=`<div class="ip-feedback">`;
  if(monthly<=0){
    h+=`<p>🚨 No surplus available to invest. Increase income or reduce expenses first.</p>`;
  }else if(calc.months<600){
    h+=`<p>📍 If you invest <b>${ipPct}%</b> of your surplus, you will reach this goal in <b>${fmtTime(calc.months)}</b></p>`;
    if(ipPct<100&&!ipManualMode){
      const nPct=Math.min(ipPct+10,100);const nM=Math.round(surplus*nPct/100);
      const nCalc=sipMonths(nM,rate,effectiveGap>0?effectiveGap:1,0);
      if(nCalc.months<calc.months){
        const saved=calc.months-nCalc.months;
        h+=`<p>⏱️ Increasing to <b>${nPct}%</b> reduces time by <b>${saved>12?Math.round(saved/12)+' year(s)':saved+' month(s)'}</b></p>`;
      }
    }
    if(ipPct>50&&!ipManualMode){
      const lPct=Math.max(ipPct-10,50);const lM=Math.round(surplus*lPct/100);
      const lCalc=sipMonths(lM,rate,effectiveGap>0?effectiveGap:1,0);
      if(lCalc.months<600){
        h+=`<p>📉 At <b>${lPct}%</b>, this goal will take ~<b>${fmtTime(lCalc.months)}</b></p>`;
      }
    }
  }else{
    h+=`<p>⚠️ At current allocation, this goal may take extremely long. Consider increasing allocation or choosing a higher-return option.</p>`;
  }
  h+=`</div>`;

  // Comparison insights
  h+=`<div class="ip-compare"><h5>🔄 Comparison with Other Options</h5>`;
  INV_TYPES.filter(t=>t.key!==ipTypeKey).forEach(t=>{
    const cCalc=sipMonths(monthly,t.rate,effectiveGap>0?effectiveGap:1,0);
    if(calc.months<600&&cCalc.months<600){
      const diff=cCalc.months-calc.months;
      if(diff>0){
        h+=`<div class="ip-cmp-row"><span class="cmp-i">${t.icon}</span>Compared to <b>${esc(t.name)}</b>, ${esc(opt.name)} is <b style="color:var(--green)">${diff>12?(diff/12).toFixed(1)+' years':diff+' months'} faster</b></div>`;
      }else if(diff<0){
        h+=`<div class="ip-cmp-row"><span class="cmp-i">${t.icon}</span>Compared to <b>${esc(t.name)}</b>, ${esc(opt.name)} takes <b style="color:var(--orange)">${Math.abs(diff)>12?(Math.abs(diff)/12).toFixed(1)+' years':Math.abs(diff)+' months'} longer</b></div>`;
      }else{
        h+=`<div class="ip-cmp-row"><span class="cmp-i">${t.icon}</span>Similar timeline to <b>${esc(t.name)}</b></div>`;
      }
    }else if(calc.months<600&&cCalc.months>=600){
      h+=`<div class="ip-cmp-row"><span class="cmp-i">${t.icon}</span><b>${esc(t.name)}</b> would take extremely long at this allocation</div>`;
    }
  });
  h+=`</div>`;

  // Actions
  h+=`<div class="ip-actions">
    <button style="background:var(--border);color:var(--text)" onclick="closeIP()">Close</button>
    <button style="background:var(--blue);color:#fff" onclick="closeIP();openMo('goal','${g.owner}','${g.id}')">✏️ Edit Goal</button>
    <button style="background:var(--green);color:#000;font-weight:700;flex:2" onclick="applyStrategy()">✅ Apply This Strategy</button>
  </div>`;

  document.getElementById('ipTitle').innerHTML='🎯 '+esc(g.name)+' — '+opt.icon+' '+esc(opt.name);
  document.getElementById('ipBody').innerHTML=h;
}

function applyStrategy(){
  const g=S.goals.find(x=>x.id===ipGoalId);if(!g)return;
  const opt=INV_TYPES.find(t=>t.key===ipTypeKey);if(!opt)return;
  const surplus=getSurplusForGoal(g);
  const monthly=ipManualMode?ipManualSIP:Math.round(surplus*ipPct/100);
  const rate=ipCustomRate;
  const gap=Math.max(0,(g.target||0)-(g.current||0));
  const lump=ipLump||0;
  const effectiveGap=Math.max(0,gap-lump);
  const calc=sipMonths(monthly,rate,effectiveGap>0?effectiveGap:1,0);
  g.strategy={key:opt.key,name:opt.name,allocPct:ipPct,monthlySIP:monthly,customRate:rate,lumpSum:lump,months:calc.months,manualSIP:ipManualMode?ipManualSIP:0};
  saveS();closeIP();renderPage();
}

// ── Snapshots ──
function snap(){const m=new Date().toISOString().slice(0,7);if(!S.snaps)S.snaps=[];const ex=S.snaps.find(s=>s.month===m);const sn={month:m,nw:tNW(),a:tA(),l:tL()};if(ex)Object.assign(ex,sn);else S.snaps.push(sn);if(S.snaps.length>24)S.snaps=S.snaps.slice(-24);saveS()}

// ── Modal ──
function openMo(type,owner,id){
  const isE=!!id;let item=null,col='';
  if(type==='asset'){col='assets';item=isE?S.assets.find(a=>a.id===id):null}
  else if(type==='liability'){col='liabilities';item=isE?S.liabilities.find(l=>l.id===id):null}
  else if(type==='income'){col='income';item=isE?S.income.find(i=>i.id===id):null}
  else if(type==='expense'){col='expenses';item=isE?S.expenses.find(e=>e.id===id):null}
  else if(type==='goal'){col='goals';item=isE?S.goals.find(g=>g.id===id):null}
  else if(type==='insurance'){col='insurance';item=isE?S.insurance.find(p=>p.id===id):null}
  mCtx={type,owner:item?item.owner:owner,id,col,isE};
  document.getElementById('moTitle').textContent=(isE?'Edit ':'Add ')+type.charAt(0).toUpperCase()+type.slice(1);
  document.getElementById('delBtn').style.display=isE?'block':'none';
  const oo=S.meta.sp?`<option value="self" ${mCtx.owner==='self'?'selected':''}>${esc(gn('self'))}</option><option value="spouse" ${mCtx.owner==='spouse'?'selected':''}>${esc(gn('spouse'))}</option><option value="joint" ${mCtx.owner==='joint'?'selected':''}>Joint</option>`:`<option value="self" selected>${esc(gn('self'))}</option>`;
  let h='';
  if(type==='asset'){const a=item||{};
    h=`<div class="fg"><label>Asset Name</label><input id="f_name" value="${esc(a.name||'')}" placeholder="e.g. HDFC Savings"></div>
    <div class="fr"><div class="fg"><label>Category</label><select id="f_cat">${ACAT.map(c=>`<option ${a.category===c?'selected':''}>${c}</option>`).join('')}</select></div><div class="fg"><label>Owner</label><select id="f_own">${oo}</select></div></div>
    <div class="fr"><div class="fg"><label>Invested Amount (₹)</label><input id="f_inv" type="number" value="${a.invested||''}"></div><div class="fg"><label>Current Value (₹)</label><input id="f_cur" type="number" value="${a.currentValue||''}"></div></div>
    <div class="fr" id="cRow" style="display:${mCtx.owner==='joint'?'grid':'none'}"><div class="fg"><label>Self Contribution %</label><input id="f_sc" type="number" value="${a.selfC||50}" min="0" max="100"></div><div class="fg"><label>Spouse Contribution %</label><input id="f_spc" type="number" value="${a.spouseC||50}" min="0" max="100"></div></div>
    <div class="fg"><label>Last Updated</label><input id="f_upd" type="date" value="${a.updated||td()}"></div>`}
  else if(type==='liability'){const l=item||{};
    h=`<div class="fg"><label>Liability Name</label><input id="f_name" value="${esc(l.name||'')}" placeholder="e.g. Home Loan"></div>
    <div class="fr"><div class="fg"><label>Type</label><select id="f_type">${LTYP.map(t=>`<option ${l.type===t?'selected':''}>${t}</option>`).join('')}</select></div><div class="fg"><label>Owner</label><select id="f_own">${oo}</select></div></div>
    <div class="fr"><div class="fg"><label>Total Amount (₹)</label><input id="f_total" type="number" value="${l.total||''}"></div><div class="fg"><label>Outstanding (₹)</label><input id="f_out" type="number" value="${l.outstanding||''}"></div></div>
    <div class="fr3"><div class="fg"><label>EMI (₹/mo)</label><input id="f_emi" type="number" value="${l.emi||''}"></div><div class="fg"><label>Interest %</label><input id="f_rate" type="number" step="0.1" value="${l.rate||''}"></div><div class="fg"><label>Tenure (months)</label><input id="f_ten" type="number" value="${l.tenure||''}"></div></div>`}
  else if(type==='income'){const i=item||{};
    h=`<div class="fg"><label>Income Source</label><input id="f_name" value="${esc(i.name||'')}" placeholder="e.g. Salary"></div>
    <div class="fr"><div class="fg"><label>Type</label><select id="f_type">${ITYP.map(t=>`<option ${i.type===t?'selected':''}>${t}</option>`).join('')}</select></div><div class="fg"><label>Owner</label><select id="f_own">${oo}</select></div></div>
    <div class="fg"><label>Monthly Amount (₹)</label><input id="f_amt" type="number" value="${i.amount||''}"></div>`}
  else if(type==='expense'){const e=item||{};
    h=`<div class="fg"><label>Expense Name</label><input id="f_name" value="${esc(e.name||'')}" placeholder="e.g. Rent"></div>
    <div class="fr"><div class="fg"><label>Category</label><select id="f_cat"><option ${e.isEMI?'selected':''} value="EMI">EMI</option>${ECAT.map(c=>`<option ${!e.isEMI&&e.category===c?'selected':''}>${c}</option>`).join('')}</select></div><div class="fg"><label>Owner</label><select id="f_own">${oo}</select></div></div>
    <div class="fg"><label>Monthly Amount (₹)</label><input id="f_amt" type="number" value="${e.amount||''}"></div>`}
  else if(type==='goal'){const g=item||{};
    h=`<div class="fg"><label>Goal Name</label><input id="f_name" value="${esc(g.name||'')}" placeholder="e.g. Emergency Fund"></div>
    <div class="fg"><label>Owner</label><select id="f_own">${oo}</select></div>
    <div class="fr"><div class="fg"><label>Target Amount (₹)</label><input id="f_tar" type="number" value="${g.target||''}"></div><div class="fg"><label>Saved So Far (₹)</label><input id="f_cur" type="number" value="${g.current||''}"></div></div>`}
  else if(type==='insurance'){const p=item||{};
    h=`<div class="fg"><label>Policy Name</label><input id="f_name" value="${esc(p.name||'')}" placeholder="e.g. HDFC Term Plan"></div>
    <div class="fr"><div class="fg"><label>Insurance Type</label><select id="f_itype">${ITYPS.map(t=>`<option ${p.insType===t?'selected':''}>${t}</option>`).join('')}</select></div><div class="fg"><label>Owner</label><select id="f_own">${oo}</select></div></div>
    <div class="fr"><div class="fg"><label>Provider / Company</label><input id="f_prov" value="${esc(p.provider||'')}" placeholder="e.g. HDFC Life"></div><div class="fg"><label>Policy Number</label><input id="f_pno" value="${esc(p.policyNo||'')}" placeholder="e.g. POL123456"></div></div>
    <div class="fr"><div class="fg"><label>Cover Amount (₹)</label><input id="f_cover" type="number" value="${p.cover||''}"></div><div class="fg"><label>Annual Premium (₹)</label><input id="f_prem" type="number" value="${p.premium||''}"></div></div>
    <div class="fg"><label>Expiry Date</label><input id="f_exp" type="date" value="${p.expiry||''}"></div>`}
  document.getElementById('moFields').innerHTML=h;
  document.getElementById('moOverlay').classList.add('active');
  const os=document.getElementById('f_own');
  if(os&&type==='asset')os.addEventListener('change',()=>{const cr=document.getElementById('cRow');if(cr)cr.style.display=os.value==='joint'?'grid':'none'});
  setTimeout(()=>{document.querySelector('#moFields input')?.focus();attachAmtPreview()},50);
}
function closeMo(){document.getElementById('moOverlay').classList.remove('active');mCtx=null}
function v(id){const el=document.getElementById(id);return el?el.value.trim():''}
function n(id){return Number(v(id))||0}
function saveMo(){
  if(!mCtx)return;const{type,col,id,isE}=mCtx;const name=v('f_name');if(!name)return;const owner=v('f_own')||'self';
  let item;
  if(type==='asset')item={id:isE?id:gid(),name,category:v('f_cat'),owner,currentValue:n('f_cur'),invested:n('f_inv'),updated:v('f_upd')||td(),selfC:n('f_sc')||50,spouseC:n('f_spc')||50};
  else if(type==='liability')item={id:isE?id:gid(),name,type:v('f_type'),owner,total:n('f_total'),outstanding:n('f_out'),emi:n('f_emi'),rate:n('f_rate'),tenure:n('f_ten')};
  else if(type==='income')item={id:isE?id:gid(),name,type:v('f_type'),owner,amount:n('f_amt')};
  else if(type==='expense'){const cat=v('f_cat');item={id:isE?id:gid(),name,category:cat==='EMI'?'EMI':cat,owner,amount:n('f_amt'),isEMI:cat==='EMI'}}
  else if(type==='goal'){const prev=isE?S.goals.find(x=>x.id===id):null;item={id:isE?id:gid(),name,owner,target:n('f_tar'),current:n('f_cur'),strategy:prev?prev.strategy:undefined}}
  else if(type==='insurance')item={id:isE?id:gid(),name,insType:v('f_itype'),owner,provider:v('f_prov'),policyNo:v('f_pno'),cover:n('f_cover'),premium:n('f_prem'),expiry:v('f_exp')};
  if(isE){const idx=S[col].findIndex(x=>x.id===id);if(idx>=0)S[col][idx]=item}else S[col].push(item);
  saveS();render();closeMo();
}
function delItem(){if(!mCtx)return;S[mCtx.col]=S[mCtx.col].filter(x=>x.id!==mCtx.id);saveS();render();closeMo()}
function delById(col,id){S[col]=S[col].filter(x=>x.id!==id);saveS();render()}

// ── Live Amount Preview ──
function attachAmtPreview(){document.querySelectorAll('#moFields input[type=number]').forEach(inp=>{let tip=inp.parentElement.querySelector('.amt-tip');if(!tip){tip=document.createElement('div');tip.className='amt-tip';tip.style.cssText='font-size:.72rem;color:var(--blue);margin-top:2px;min-height:1em;font-weight:500';inp.parentElement.appendChild(tip)}inp.addEventListener('input',()=>{const v=Number(inp.value);tip.textContent=v?fmt(v):''});
if(inp.value){const v=Number(inp.value);tip.textContent=v?fmt(v):''}})}

// ── Keyboard ──
document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(document.getElementById('ipOverlay').classList.contains('active'))closeIP();else closeMo()}if(e.key==='Enter'&&document.getElementById('moOverlay').classList.contains('active')){e.preventDefault();saveMo()}});

// ── Init ──
render();
</script>
</body>
