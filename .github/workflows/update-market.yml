name: Update Market Data

on:
  schedule:
    # 6:00 PM IST = 12:30 UTC — after NSE publishes archive CSV, Mon–Fri
    - cron: '30 12 * * 1-5'
  workflow_dispatch:

jobs:
  update-market:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch market indices (NSE India archive CSV)
        run: node scripts/fetch-indices.js

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market.json
          git diff --staged --quiet || git commit -m "chore: market data $(date -u +'%Y-%m-%d')"
          git push
